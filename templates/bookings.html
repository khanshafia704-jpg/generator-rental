<!DOCTYPE html>
<html>
<head>
<title>My Bookings</title>
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>
body{
background:#0b132b;
font-family:Arial;
margin:0;
}

.bookings-container{
width:80%;
margin:60px auto;
}

.bookings-title{
color:gold;
font-size:32px;
margin-bottom:30px;
}

.bookings-table{
width:100%;
border-collapse:collapse;
background:#111;
border-radius:10px;
overflow:hidden;
}

.bookings-table th{
background:black;
color:gold;
padding:14px;
font-size:16px;
}

.bookings-table td{
padding:14px;
text-align:center;
color:white;
border-bottom:1px solid #333;
}

.bookings-table tr:hover{
background:#1c1c1c;
}

.status-success{
color:#2ecc71;
font-weight:bold;
}

.status-failed{
color:#e74c3c;
font-weight:bold;
}

/* FORM STYLE */
.form-box{
margin-bottom:30px;
}

input{
padding:10px;
margin:10px;
border:none;
border-radius:5px;
}

button{
padding:10px 20px;
background:gold;
border:none;
cursor:pointer;
border-radius:5px;
}
</style>

</head>

<body>
    

<header class="navbar">
    <h2 class="logo">⚡ Power Service Generator</h2>

    <div class="nav-links">
        <a href="/dashboard">Home</a>
        <a href="/my_bookings">My Bookings</a>
        <a href="/contact">Contact</a>
        <a href="/logout">Logout</a>
    </div>
</header>

<div class="bookings-container">

<h1 class="bookings-title">📋 My Bookings</h1>

<!-- ✅ BOOKING FORM -->
<div class="form-box">

<form method="POST" action="/book">

<input type="text" name="generator" placeholder="Enter Generator (5KVA / 10KVA)" required>

<input type="number" name="days" placeholder="Days" required>

<button type="submit">Book Now</button>

</form>

</div>

<!-- ✅ BOOKINGS TABLE -->
<table class="bookings-table">

<tr>
<th>Generator</th>
<th>Days</th>
<th>Total</th>
<th>Status</th>
</tr>

{% for b in bookings %}

<tr>

<td>{{ b[2] }}</td>   <!-- generator -->
<td>{{ b[3] }}</td>   <!-- days -->
<td>₹{{ b[4] }}</td>  <!-- total -->

<td>
{% if b[5] == "Success" %}
<span class="status-success">Success</span>
{% else %}
<span class="status-failed">Failed</span>
{% endif %}
</td>

</tr>

{% endfor %}

</table>

</div>

</body>
</html>
