<!DOCTYPE html>
<html>
<head>
    <title>Power Service Generator Rental</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <style>
        .home-container{
            height:100vh;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            text-align:center;
        }

        .home-container h1{
            font-size:48px;
            margin-bottom:40px;
            letter-spacing:2px;
        }

        .home-buttons a{
            padding:14px 40px;
            margin:10px;
            border-radius:30px;
            text-decoration:none;
            font-weight:600;
            transition:0.3s;
        }

        .login-btn{
            background:white;
            color:black;
        }

        .register-btn{
            border:2px solid white;
            color:white;
        }

        .login-btn:hover{
            background:#00ffff;
            color:black;
        }

        .register-btn:hover{
            background:white;
            color:black;
        }
    </style>
</head>
<body>

<div class="home-container">
    <h1>⚡ Power Service Generator Rental</h1>

    <div class="home-buttons">
        <a href="/login" class="login-btn">Login</a>
        <a href="/register" class="register-btn">Register</a>
    </div>
</div>

</body>
</html>
