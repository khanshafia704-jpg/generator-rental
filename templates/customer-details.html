<!DOCTYPE html>
<html>
<head>
    <title>Customer Details</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="dark-bg">
    <body>

<header class="navbar">
    <h2 class="logo">⚡ Power Service Generator</h2>

    <div class="nav-links">
        <a href="/dashboard">Home</a>
        <a href="/my_bookings">My Bookings</a>
         <a href="/contact">Contact</a>
        <a href="/logout">Logout</a>
    </div>
</header>

<div class="customer-box">
    <h2>Customer Information</h2>

    <form method="POST">

        <div class="input-group">
            <label>Full Address</label>
            <textarea name="address" placeholder="Enter full address" required></textarea>
        </div>

        <div class="input-group">
            <label>City / Area</label>
            <input type="text" name="city" placeholder="e.g. Andheri, Mumbai" required>
        </div>

        <button type="submit">Continue to Rent</button>
    </form>
</div>

</body>
